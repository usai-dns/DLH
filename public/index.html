<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Anniversary, Hallie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Intro prompt — user interaction unlocks audio -->
  <div class="music-prompt" id="music-prompt">
    <div class="music-prompt-card">
      <p>I have something for you...</p>
      <button id="btn-start">Open</button>
    </div>
  </div>

  <!-- Ambient floating sparkles -->
  <div class="ambient-bg" id="ambient-bg"></div>

  <!-- ===== Page 1: Anniversary Card ===== -->
  <div id="page-card" class="page">
    <div class="card-scene">
      <div class="card-wrapper" id="card-wrapper">
        <!-- Card with image -->
        <div class="card-body">
          <img class="card-photo" src="images/main-cut.jpg" alt="">
          <div class="card-text-area">
            <h1 class="card-title">Happy Anniversary,<br>My Love</h1>
            <div class="card-divider">
              <span></span><span class="divider-heart">&#10084;</span><span></span>
            </div>
            <p class="card-message">I love your body,<br>moving with my body&hellip;</p>
            <button class="btn btn-open" id="btn-open">I want MORE</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Page 2: Dance Selection ===== -->
  <div id="page-dance" class="page">
    <!-- Two background layers for cross-fade transitions -->
    <div class="dance-bg-layer" id="dance-bg-1"></div>
    <div class="dance-bg-layer" id="dance-bg-2"></div>
    <div class="dance-overlay"></div>

    <!-- Spotlights on dance page (before selection) -->
    <div class="dance-spotlights" id="dance-spotlights"></div>

    <div class="dance-content" id="dance-content">

      <h2 class="dance-title" id="dance-title">So let&rsquo;s go take some<br>dance lessons!</h2>

      <!-- Dance style selector grid -->
      <div class="dance-selector" id="dance-selector">
        <button class="dance-option" data-style="tango">
          <span class="dance-icon">&#x1F339;</span>
          <span class="dance-name">Tango</span>
          <span class="dance-desc">Passionate &amp; Dramatic</span>
        </button>
        <button class="dance-option" data-style="salsa">
          <span class="dance-icon">&#x1F336;&#xFE0F;</span>
          <span class="dance-name">Salsa</span>
          <span class="dance-desc">Hot &amp; Energetic</span>
        </button>
        <button class="dance-option" data-style="blues">
          <span class="dance-icon">&#x1F3B7;</span>
          <span class="dance-name">Blues</span>
          <span class="dance-desc">Soulful &amp; Smooth</span>
        </button>
        <button class="dance-option" data-style="swing">
          <span class="dance-icon">&#x1F3BA;</span>
          <span class="dance-name">Swing</span>
          <span class="dance-desc">Upbeat &amp; Joyful</span>
        </button>
        <button class="dance-option" data-style="hiphop">
          <span class="dance-icon">&#x1F3A4;</span>
          <span class="dance-name">Hip Hop</span>
          <span class="dance-desc">Bold &amp; Fresh</span>
        </button>
        <button class="dance-option" data-style="country">
          <span class="dance-icon">&#x1F920;</span>
          <span class="dance-name">Country</span>
          <span class="dance-desc">Warm &amp; Classic</span>
        </button>
      </div>

      <button class="btn btn-lockin" id="btn-lockin" disabled>Lock In Your Answer</button>
    </div>
  </div>

  <!-- ===== Page 3: Celebration ===== -->
  <div id="page-celebrate" class="page">
    <div class="celebrate-bg" id="celebrate-bg"></div>
    <div class="spotlight-container" id="spotlight-container"></div>
    <div class="celebrate-content" id="celebrate-content">
      <h1 class="celebrate-main">&#127881; It&rsquo;s a Date! &#127881;</h1>
      <div class="celebrate-dance-name" id="celebrate-dance-name"></div>
      <p class="celebrate-sub">Get ready to move, my love</p>
      <div class="celebrate-hearts">&#10084;&#65039;</div>
    </div>
  </div>

  <!-- Effects canvas (confetti / sparkles) -->
  <canvas id="effects-canvas"></canvas>

  <script src="script.js"></script>
</body>
</html>
